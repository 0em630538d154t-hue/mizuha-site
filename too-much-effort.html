    <h1>頑張りすぎているあなたへ</h1>
    <p class="date">2026.06.04</p>
    <ul class="tags">
      <li>休む</li>
      <li>許可</li>
      <li>ゆるめる</li>
    </ul>
    <p>頑張りすぎた日は、心の水面が細かく揺れているかもしれません。</p>
    <p>そんな時は、答えを急がなくて大丈夫です。まずは肩の力を抜いて、息を吐くことから。</p>
    <p>何もできなかった日ではなく、ここまで持ちこたえてきた日。そう受け取るだけで、内側に少し余白が戻ってきます。</p>
    <p class="note">今日の言葉：もう少し、わたしにやさしくしていい。</p>
