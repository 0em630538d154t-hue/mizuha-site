    <h1>水を飲むことから始める朝</h1>
    <p class="date">2026.06.08</p>
    <ul class="tags">
      <li>水</li>
      <li>朝</li>
      <li>リセット</li>
    </ul>
    <p>朝いちばんの時間は、内なる水がまだ静かに目覚めていく時間です。</p>
    <p>白湯をひと口飲む。窓を開けて、呼吸を深める。今日の自分に、やさしい言葉をひとつかける。</p>
    <p>大きなことをしなくても、身体の水は小さな習慣に反応します。急がず、澄ませるように始める朝は、その日一日の流れを静かに整えてくれます。</p>
    <p class="note">今日の問い：わたしの水は、今どんな音をしていますか。</p>
