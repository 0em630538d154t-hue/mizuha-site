    <h1>ただ、気づくだけでいい</h1>
    <p class="date">2026.06.03</p>
    <ul class="tags">
      <li>気づき</li>
      <li>意識</li>
      <li>やさしく</li>
    </ul>
    <p>言葉は、思っているよりも深く身体に届いています。</p>
    <p>責める言葉は水面を波立たせ、やさしい言葉は静かな輪を広げます。</p>
    <p>今日、自分にかける言葉をひとつ選ぶなら。どんな響きを、内なる水へ届けたいでしょうか。</p>
    <p class="note">今日の問い：わたしに必要な一言は何ですか。</p>
