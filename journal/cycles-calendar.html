    <h1>季節の変わり目に、ふと思うこと</h1>
    <p class="date">2026.06.06</p>
    <ul class="tags">
      <li>季節</li>
      <li>暦</li>
      <li>感じる</li>
    </ul>
    <p>流れには、目に見えるものと見えないものがあります。</p>
    <p>季節、月、暦、身体のリズム。私たちはいつも、いくつもの巡りの中で生きています。</p>
    <p>うまく進めない日も、流れが止まったわけではありません。静かに満ちる時間も、巡りの一部です。</p>
    <p class="note">今日の問い：今のわたしは、満ちる時ですか。ゆるむ時ですか。</p>
