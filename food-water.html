    <h1>食べることは、自分を大切にすること</h1>
    <p class="date">2026.06.05</p>
    <ul class="tags">
      <li>食事</li>
      <li>愛</li>
      <li>丁寧に</li>
    </ul>
    <p>食べることは、身体の水に触れることです。</p>
    <p>何を食べるかだけでなく、どんな気持ちで食べるかも、内なる巡りに静かに影響します。</p>
    <p>急いで満たすのではなく、身体の声を聴きながら選ぶ。食を整えることは、自分を大切にする感覚を思い出すことでもあります。</p>
    <p class="note">今日の水：ひと口目を、少しゆっくり味わう。</p>
